<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Omniscient AI</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet"
          href="/static/css/chat.css">

</head>

<body>


<nav class="navbar">

    <div class="logo">

        <h2>Omniscient AI</h2>

    </div>

    <div class="nav-links">
  <a href="/api/dashboard">Dashboard</a>
       

        <a href="/chat" class="active">Chat</a>
 <a href="/">Documents</a>
      

    </div>

    <div class="nav-right">

        <button id="new-chat" class="primary-btn">
            + New Chat
        </button>

    </div>

</nav>

<!-- ================= MAIN ================= -->

<div class="layout">

    <!-- Conversation History -->

    <aside class="history-panel">

        <div class="panel-header">

            <h3>Recent Chats</h3>

            <button id="clear-history">
                Clear
            </button>
        </div>
        <div
            id="history-box"
            class="history-list">
        </div>
    </aside>

    <!-- Chat -->

    <main class="chat-panel">

        <div class="chat-header">

            <div>

                <h1>Industrial Knowledge Assistant</h1>

            </div>

            <span
                id="chat-status"
                class="status">

                Ready

            </span>

        </div>

       <div id="chat-window" class="chat-window">

    <div id="empty-state" class="empty-state">
        <div class="empty-icon">🤖</div>
        <h2>Omniscient is ready to serve</h2>
        <p></p>
    </div>

</div>

<div class="input-container">

    <textarea
        id="question-input"
        placeholder="Ask about equipment, SOPs, maintenance logs..."
        rows="1"></textarea>

    <button id="ask-button">
        ➤
    </button>

</div>

    </main>

</div>
<script src="/static/js/chat.js"></script>
</body>
</html>
