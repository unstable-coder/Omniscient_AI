<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Industrial Knowledge Admin</title>
  <link rel="stylesheet" href="/static/css/admin.css" />
</head>
<body>

<!-- ================= Navbar ================= -->

<nav class="navbar">

    <div class="nav-left">
        <h2>Omniscient AI</h2>
    </div>

    <div class="nav-center">
       
        <a href="/api/dashboard">Dashboard</a>
         <a href="/chat">Chat</a>
        <a href="#" class="active">Uploads</a>
    </div>

    <div class="nav-right">
        <span id="connection-status" class="status-pill">
            ● Connected
        </span>
    </div>

</nav>

<!-- ================= Main ================= -->

<main class="container">

    <!-- Page Heading -->

    <section class="page-header">

        <div>
            <h1>Knowledge Repository</h1>
            <p>Manage and  uploaded documents</p>
        </div>

    </section>

    <!-- Upload -->

    <section class="upload-card">

        <div class="upload-left">

            <div class="upload-icon">
                📄
            </div>

            <div>

                <h3>Upload Documents</h3>

                <p>
                    PDF, DOCX, XLSX, CSV, TXT
                </p>

            </div>

        </div>

        <div class="upload-right">

            <button id="select-files">
                Browse Files
            </button>

            <button id="upload-files" disabled>
                Upload
            </button>

        </div>

    </section>

    <!-- Drag Drop -->

    <section
        id="drop-zone"
        class="drop-zone">

        <input
            id="file-input"
            type="file"
            multiple
            hidden>

        <div class="drop-content">

            <h3>
                Drag & Drop Files
            </h3>

            <p>
                or click here to browse
            </p>

        </div>

    </section>

    <div
        id="file-list"
        class="file-list">
    </div>

    <!-- Documents -->

    <section class="table-card">

        <div class="table-toolbar">

            <div>

                <h2>Documents</h2>

                <small>
                    Uploaded knowledge sources
                </small>

            </div>

            <button id="refresh-documents">
                Refresh
            </button>

        </div>

        <div class="table-wrapper">

            <table>

                <thead>

                    <tr>

                        <th>Filename</th>

                        <th>Type</th>

                        <th>Size</th>

                        <th>Date</th>

                        <th>Status</th>

                        <th>Chunks</th>

                        <th>
                            Actions
                        </th>

                    </tr>

                </thead>

                <tbody id="documents-body">

                </tbody>

            </table>

        </div>

    </section>

</main>

<script src="/static/js/admin.js"></script>

</body>
</html>
